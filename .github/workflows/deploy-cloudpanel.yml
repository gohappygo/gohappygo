name: Deploy CloudPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudpanel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest

    env:
      CLOUDPANEL_HOST: gohappygo.fr
      CLOUDPANEL_PORT: "22"
      CLOUDPANEL_USER: gohappygo
      CLOUDPANEL_TARGET_DIR: /home/gohappygo/htdocs/gohappygo.fr
      CLOUDPANEL_REMOTE_TMP: /home/gohappygo/tmp/gohappygo-front-${{ github.sha }}.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create production env file
        env:
          FRONTEND_ENV_PRODUCTION: ${{ secrets.FRONTEND_ENV_PRODUCTION }}
        run: printf '%s\n' "$FRONTEND_ENV_PRODUCTION" > .env.production

      - name: Build static client
        run: npm run build

      - name: Verify static build
        run: test -f build/client/index.html

      - name: Package static build
        run: tar -czf gohappygo-front.tar.gz -C build/client .

      - name: Configure SSH
        env:
          CLOUDPANEL_SSH_PRIVATE_KEY: ${{ secrets.CLOUDPANEL_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$CLOUDPANEL_SSH_PRIVATE_KEY" > ~/.ssh/cloudpanel_deploy_key
          chmod 600 ~/.ssh/cloudpanel_deploy_key
          ssh-keyscan -p "$CLOUDPANEL_PORT" "$CLOUDPANEL_HOST" >> ~/.ssh/known_hosts

      - name: Upload artifact to CloudPanel
        run: |
          scp \
            -i ~/.ssh/cloudpanel_deploy_key \
            -P "$CLOUDPANEL_PORT" \
            gohappygo-front.tar.gz \
            "$CLOUDPANEL_USER@$CLOUDPANEL_HOST:$CLOUDPANEL_REMOTE_TMP"

      - name: Activate release on CloudPanel
        run: |
          ssh \
            -i ~/.ssh/cloudpanel_deploy_key \
            -p "$CLOUDPANEL_PORT" \
            "$CLOUDPANEL_USER@$CLOUDPANEL_HOST" \
            "set -eu
             TARGET_DIR='$CLOUDPANEL_TARGET_DIR'
             RELEASE='$CLOUDPANEL_REMOTE_TMP'
             BACKUP_DIR='/home/gohappygo/backups/deployments'
             BACKUP_FILE=\"\$BACKUP_DIR/gohappygo.fr-\$(date +%Y%m%d%H%M%S).tar.gz\"
             mkdir -p \"\$TARGET_DIR\" \"\$BACKUP_DIR\"
             tar -czf \"\$BACKUP_FILE\" -C \"\$TARGET_DIR\" .
             find \"\$TARGET_DIR\" -mindepth 1 -maxdepth 1 ! -name '.well-known' -exec rm -rf {} +
             tar -xzf \"\$RELEASE\" -C \"\$TARGET_DIR\"
             rm -f \"\$RELEASE\"
             find \"\$TARGET_DIR\" -type d -exec chmod 770 {} +
             find \"\$TARGET_DIR\" -type f -exec chmod 660 {} +
             echo \"Deployed ${{ github.sha }} to \$TARGET_DIR\""
